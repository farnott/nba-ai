<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No problem — NBA AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #0a0a0f;
    --accent: #00e5a0;
    --white: #ffffff;
    --white-70: rgba(255,255,255,0.7);
    --border: rgba(255,255,255,0.08);
    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body {
    background: var(--dark);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 520px; }
  .icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 2rem;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  p {
    color: var(--white-70);
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  a.btn {
    display: inline-block;
    background: var(--accent);
    color: #0a0a0f;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.85rem 2rem;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  a.btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">←</div>
  <h1>No problem.</h1>
  <p>You haven't been charged anything. If you change your mind, the £1 trial is still waiting for you.</p>
  <a href="/" class="btn">Take another look</a>
</div>
</body>
</html>
